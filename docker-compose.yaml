services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lib-net

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - lib-net

  api:
    build: ./backend
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      - db
      - minio
    networks:
      - lib-net

  backend:
    build: ./backend
    env_file: .env
    depends_on:
      - api
    networks:
      - lib-net

  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    networks:
      - lib-net

  # PINDAH KE SINI: Harus di dalam blok "services"
  haproxy:
    image: haproxy:latest
    container_name: haproxy-lb
    ports:
      - "8000:80"
      - "8404:8404"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      - lib-net
    depends_on:
      - api
      - backend

networks:
  lib-net:
    driver: bridge

volumes:
  minio_data:
  postgres_data:
