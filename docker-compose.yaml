services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lib-net

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - lib-net

  api:
    build: ./backend
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      - db
      - minio
    networks:
      - lib-net

  backend: # Service ke-4 sesuai soal
    build: ./backend
    env_file: .env
    depends_on:
      - api
    networks:
      - lib-net

  frontend: # Service ke-5 sesuai soal
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    networks:
      - lib-net

networks:
  lib-net:
    driver: bridge

volumes:
  minio_data:
  postgres_data: